<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHADOW MARKET | VIBRANT SYSTEM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-pink: #ff00ff;
            --sakura-pink: #ffb7c5;
            --vibrant-bg: #0a001a;
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden;
            background: var(--vibrant-bg);
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
        }

        .font-orbitron { font-family: 'Orbitron', sans-serif; }

        #canvas-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }

        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .neon-glow-blue { box-shadow: 0 0 20px var(--neon-blue); border-color: var(--neon-blue); }
        .neon-glow-pink { box-shadow: 0 0 20px var(--neon-pink); border-color: var(--neon-pink); }
        
        .neon-text-blue { color: var(--neon-blue); text-shadow: 0 0 10px var(--neon-blue); }
        .neon-text-pink { color: var(--neon-pink); text-shadow: 0 0 10px var(--neon-pink); }

        .tab-btn.active {
            background: linear-gradient(45deg, var(--neon-blue), var(--neon-pink));
            color: black;
            font-weight: bold;
        }

        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
        .custom-scroll::-webkit-scrollbar-thumb { background: var(--neon-pink); border-radius: 10px; }

        .status-bar { height: 8px; background: rgba(0,0,0,0.5); border-radius: 4px; overflow: hidden; }
        .status-fill-hp { height: 100%; background: linear-gradient(90deg, #ff0055, #ff00ff); width: 100%; }
        .status-fill-mp { height: 100%; background: linear-gradient(90deg, #00d2ff, #00f2ff); width: 100%; }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .float { animation: float 3s ease-in-out infinite; }

        .admin-prompt {
            position: fixed; inset: 0; z-index: 1000;
            background: rgba(0,0,0,0.9);
            display: flex; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>

    <!-- Admin Entry Prompt -->
    <div id="admin-entry-prompt" class="admin-prompt">
        <div class="glass p-10 rounded-2xl border-2 border-[#00f2ff] text-center max-w-md w-full mx-4">
            <h2 class="text-3xl font-orbitron neon-text-blue mb-6">SYSTEM ACCESS</h2>
            <p class="text-gray-400 mb-8 uppercase tracking-widest text-sm">Enter Authorization Code</p>
            <input type="password" id="entry-code" class="w-full bg-black/40 border border-[#00f2ff44] rounded-lg px-6 py-4 outline-none text-center text-2xl tracking-[1em] mb-8 font-mono focus:border-[#00f2ff]" autofocus>
            <div class="flex gap-4">
                <button onclick="checkEntryCode()" class="flex-1 py-4 bg-[#00f2ff] text-black font-orbitron font-bold rounded-lg hover:bg-white transition-all">VERIFY</button>
                <button onclick="skipEntry()" class="flex-1 py-4 border border-white/20 font-orbitron text-sm rounded-lg hover:bg-white/10 transition-all">GUEST</button>
            </div>
        </div>
    </div>

    <!-- Awakening Overlay (Hidden initially) -->
    <div id="awakening-overlay" class="fixed inset-0 z-50 flex items-center justify-center bg-black/80 hidden">
        <div class="text-center">
            <h2 class="text-7xl md:text-9xl font-orbitron mb-12 neon-text-pink opacity-0" id="awakening-title">ARISE</h2>
            <button id="arise-btn" class="px-20 py-6 bg-white text-black font-orbitron text-3xl font-black rounded-full hover:scale-110 transition-transform shadow-[0_0_50px_rgba(255,255,255,0.5)] opacity-0">
                ARISE
            </button>
        </div>
    </div>

    <!-- Main Content -->
    <main id="main-content" class="hidden h-screen flex flex-col p-4">
        <!-- Dashboard Header -->
        <header class="glass rounded-2xl p-6 mb-4 flex flex-wrap justify-between items-center gap-6 border-b-4 border-[#ff00ff44]">
            <div class="flex items-center gap-6">
                <div class="w-20 h-20 rounded-2xl border-2 border-[#00f2ff] p-1 bg-black/40 float">
                    <img src="https://api.dicebear.com/7.x/bottts-neutral/svg?seed=Shadow" class="w-full h-full object-cover rounded-xl">
                </div>
                <div>
                    <div class="flex items-center gap-3 mb-2">
                        <span class="px-3 py-1 bg-[#00f2ff] text-black text-[10px] font-black rounded">LV. 100</span>
                        <h1 class="text-2xl font-orbitron tracking-tighter">SUNG JIN-WOO</h1>
                    </div>
                    <div class="flex gap-6">
                        <div class="w-40">
                            <div class="flex justify-between text-[10px] font-bold mb-1"><span class="text-[#ff0055]">HEALTH</span><span>25,000 / 25,000</span></div>
                            <div class="status-bar"><div class="status-fill-hp"></div></div>
                        </div>
                        <div class="w-40">
                            <div class="flex justify-between text-[10px] font-bold mb-1"><span class="text-[#00d2ff]">MANA</span><span>15,000 / 15,000</span></div>
                            <div class="status-bar"><div class="status-fill-mp"></div></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="flex gap-10 items-center">
                <div class="text-center">
                    <div class="text-[10px] text-gray-400 font-orbitron mb-1">SHADOW ARMY</div>
                    <div class="text-3xl font-black neon-text-pink">12,402</div>
                </div>
                <div class="text-center">
                    <div class="text-[10px] text-gray-400 font-orbitron mb-1">CURRENT RANK</div>
                    <div id="rank-badge" class="text-3xl font-black text-[#00f2ff]">-</div>
                </div>
                <div id="admin-badge" class="hidden px-4 py-2 bg-yellow-400 text-black font-black rounded text-xs animate-bounce">ADMIN MODE</div>
            </div>
        </header>

        <!-- Navigation Tabs -->
        <nav class="flex gap-2 mb-4">
            <button onclick="switchTab('games')" id="tab-games" class="tab-btn active flex-1 py-5 rounded-xl font-orbitron text-sm tracking-[0.3em] transition-all">GAMES</button>
            <button onclick="switchTab('apps')" id="tab-apps" class="tab-btn flex-1 py-5 rounded-xl font-orbitron text-sm tracking-[0.3em] transition-all glass">APPS</button>
            <button onclick="switchTab('comms')" id="tab-comms" class="tab-btn flex-1 py-5 rounded-xl font-orbitron text-sm tracking-[0.3em] transition-all glass">CHAT</button>
        </nav>

        <!-- Tab Viewport -->
        <div class="flex-1 overflow-hidden">
            <!-- Games/Apps Grids -->
            <div id="grid-container" class="h-full overflow-y-auto custom-scroll pr-2 pb-10">
                <div id="product-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                    <!-- Cards -->
                </div>
            </div>

            <!-- Chat System -->
            <div id="comms-container" class="hidden h-full flex flex-col gap-4">
                <div class="flex-1 flex gap-4 overflow-hidden">
                    <aside class="w-72 glass rounded-2xl p-6 flex flex-col gap-6">
                        <h3 class="font-orbitron text-xs text-[#ff00ff]">IDENTIFIED USERS</h3>
                        <div id="user-list" class="flex-1 overflow-y-auto space-y-3 custom-scroll">
                            <button onclick="selectChat('public')" class="w-full p-4 rounded-xl bg-white/10 border-l-4 border-[#00f2ff] flex items-center gap-3">
                                <i data-lucide="globe" class="w-4 h-4"></i> Public Channel
                            </button>
                        </div>
                        <div class="p-4 bg-black/40 rounded-xl border border-white/5">
                            <div class="text-[10px] text-gray-500 mb-1">SYSTEM ID</div>
                            <div id="my-id" class="text-xs font-mono truncate text-[#00f2ff]">...</div>
                        </div>
                    </aside>
                    <section class="flex-1 glass rounded-2xl flex flex-col overflow-hidden relative">
                        <div class="p-5 border-b border-white/10 flex justify-between items-center bg-white/5">
                            <div class="flex items-center gap-3">
                                <div class="w-2 h-2 rounded-full bg-green-500 animate-ping"></div>
                                <span id="active-chat-name" class="font-orbitron text-sm tracking-widest">PUBLIC HUB</span>
                            </div>
                            <span class="text-[10px] font-mono text-gray-500">SECURE P2P ENCRYPTION</span>
                        </div>
                        <div id="chat-box" class="flex-1 overflow-y-auto p-6 space-y-6 custom-scroll">
                            <!-- Messages -->
                        </div>
                        <div class="p-6 bg-white/5 border-t border-white/10">
                            <div class="flex gap-4">
                                <input type="text" id="chat-input" placeholder="Enter message or /command..." class="flex-1 bg-black/60 border border-white/10 rounded-2xl px-6 py-4 outline-none focus:border-[#ff00ff] transition-all">
                                <button id="chat-send" class="px-10 bg-gradient-to-r from-[#00f2ff] to-[#ff00ff] text-black font-orbitron font-black rounded-2xl hover:scale-105 transition-all">SEND</button>
                            </div>
                        </div>
                    </section>
                </div>
            </div>
        </div>
    </main>

    <script>
        // --- Data ---
        const PRODUCTS = {
            games: [
                { name: 'Roblox Robux', desc: 'Premium virtual currency.', icon: 'diamond', prices: ['400 Robux - $4.99', '800 Robux - $9.99', '1700 Robux - $19.99', '4500 Robux - $49.99'] },
                { name: 'COD Mobile CP', desc: 'CP for weapon skins.', icon: 'target', prices: ['80 CP - $0.99', '420 CP - $4.99', '880 CP - $9.99', '2400 CP - $24.99'] },
                { name: 'Free Fire Diamonds', desc: 'Fast FF diamonds.', icon: 'zap', prices: ['100 Diamonds - $0.99', '310 Diamonds - $2.99', '520 Diamonds - $4.99', '1060 Diamonds - $9.99'] },
                { name: 'Blood Strike Gold', desc: 'Acquire gold now.', icon: 'flame', prices: ['100 Gold - $0.99', '500 Gold - $4.99', '1000 Gold - $9.99', '2500 Gold - $24.99'] },
                { name: 'PUBG Mobile UC', desc: 'Unknown Cash.', icon: 'skull', prices: ['60 UC - $0.99', '325 UC - $4.99', '660 UC - $9.99', '1800 UC - $24.99'] },
                { name: 'Genshin Crystals', desc: 'Genesis Crystals.', icon: 'star', prices: ['60 Crystals - $0.99', '300 Crystals - $4.99', '980 Crystals - $14.99', '1980 Crystals - $29.99'] }
            ],
            apps: [
                { name: 'Apple Music', desc: '100M+ songs.', icon: 'music', prices: ['Student - $5.99/mo', 'Individual - $10.99/mo', 'Family - $16.99/mo'] },
                { name: 'YouTube Premium', desc: 'Ad-free experience.', icon: 'youtube', prices: ['Individual - $13.99/mo', 'Family - $22.99/mo', 'Student - $7.99/mo'] },
                { name: 'YouTube Music', desc: 'Music streaming.', icon: 'play-circle', prices: ['Individual - $7.00/mo', 'Family - $16.99/mo'] },
                { name: 'Spotify Premium', desc: 'Offline tracks.', icon: 'radio', prices: ['Individual - $10.99/mo', 'Duo - $14.99/mo', 'Family - $16.99/mo'] },
                { name: 'Apple TV+', desc: 'Apple Originals.', icon: 'tv', prices: ['Monthly - $9.99/mo'] },
                { name: 'Crunchyroll', desc: 'Anime library.', icon: 'clapperboard', prices: ['Fan - $7.99/mo', 'Mega Fan - $9.99/mo'] },
                { name: 'Amazon Prime', desc: 'Free delivery.', icon: 'shopping-cart', prices: ['Monthly - $14.99/mo', 'Annual - $139/yr'] },
                { name: 'Disney+', desc: 'Disney & Pixar.', icon: 'film', prices: ['Basic - $7.99/mo', 'Premium - $13.99/mo'] }
            ]
        };

        let isAdmin = false;
        let peer, adminConn;
        let myId;
        const ADMIN_ID = 'shadow-monarch-admin-999';
        let currentTab = 'games';
        let currentChat = 'public';
        let messageHistory = { public: [], private: {} };
        let activePrivateId = null;
        let connections = {};

        // --- Logic ---
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            initThree();
            renderProducts();
        });

        function checkEntryCode() {
            const code = document.getElementById('entry-code').value;
            if (code === 'VMV') {
                isAdmin = true;
                document.getElementById('admin-badge').classList.remove('hidden');
                document.getElementById('rank-badge').innerText = 'S+';
                initApp();
            } else {
                alert('ACCESS DENIED');
            }
        }

        function skipEntry() {
            initApp();
        }

        function initApp() {
            document.getElementById('admin-entry-prompt').classList.add('hidden');
            document.getElementById('awakening-overlay').classList.remove('hidden');
            gsap.to("#awakening-title", { opacity: 1, duration: 2, delay: 0.5 });
            gsap.to("#arise-btn", { opacity: 1, duration: 1, delay: 2 });
            document.getElementById('arise-btn').onclick = startSystem;
        }

        function startSystem() {
            const savedRank = localStorage.getItem('shadow_rank_v3') || (isAdmin ? 'S+' : ['E','D','C','B','A','S'][Math.floor(Math.random()*6)]);
            if (!isAdmin) localStorage.setItem('shadow_rank_v3', savedRank);
            document.getElementById('rank-badge').innerText = savedRank;

            gsap.to("#awakening-overlay", { opacity: 0, duration: 1.5, onComplete: () => {
                document.getElementById('awakening-overlay').classList.add('hidden');
                document.getElementById('main-content').classList.remove('hidden');
                initPeer();
            }});
        }

        function renderProducts() {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = '';
            PRODUCTS[currentTab].forEach(p => {
                grid.innerHTML += `
                    <div class="glass p-8 rounded-3xl border border-white/10 hover:border-[#00f2ff] transition-all group relative overflow-hidden">
                        <div class="absolute -right-4 -top-4 w-24 h-24 bg-[#00f2ff22] blur-3xl group-hover:bg-[#ff00ff22] transition-all"></div>
                        <div class="w-16 h-16 mb-6 bg-white/5 rounded-2xl flex items-center justify-center group-hover:scale-110 transition-transform">
                            <i data-lucide="${p.icon}" class="text-[#00f2ff] group-hover:text-[#ff00ff]"></i>
                        </div>
                        <h3 class="text-xl font-bold font-orbitron mb-2">${p.name}</h3>
                        <p class="text-xs text-gray-500 mb-6 h-10">${p.desc}</p>
                        <div class="space-y-3 mb-8">
                            ${p.prices.map(pr => {
                                const parts = pr.split(' - ');
                                return `<div class="flex justify-between text-xs font-mono">
                                    <span class="text-gray-400">${parts[0]}</span>
                                    <span class="text-[#00f2ff] font-bold">${parts[1]}</span>
                                </div>`;
                            }).join('')}
                        </div>
                        <button onclick="order('${p.name}')" class="w-full py-4 bg-white/5 border border-white/10 rounded-2xl font-orbitron text-[10px] tracking-widest hover:bg-[#00f2ff] hover:text-black transition-all">ACQUIRE ITEM</button>
                    </div>
                `;
            });
            lucide.createIcons();
        }

        function switchTab(t) {
            currentTab = t;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active', 'glass'));
            document.querySelectorAll('.tab-btn').forEach(b => b.id !== `tab-${t}` && b.classList.add('glass'));
            document.getElementById(`tab-${t}`).classList.add('active');
            
            if (t === 'comms') {
                document.getElementById('grid-container').classList.add('hidden');
                document.getElementById('comms-container').classList.remove('hidden');
            } else {
                document.getElementById('grid-container').classList.remove('hidden');
                document.getElementById('comms-container').classList.add('hidden');
                renderProducts();
            }
        }

        // --- PeerJS ---
        function initPeer() {
            peer = isAdmin ? new Peer(ADMIN_ID) : new Peer();
            peer.on('open', id => {
                myId = id;
                document.getElementById('my-id').innerText = id;
                if (!isAdmin) connectToAdmin();
            });

            peer.on('connection', c => {
                if (isAdmin) {
                    connections[c.peer] = c;
                    updateUserList();
                    c.on('data', d => handleIncoming(c.peer, d));
                } else {
                    c.on('data', d => handleIncoming('ADMIN', d));
                }
            });
        }

        function connectToAdmin() {
            adminConn = peer.connect(ADMIN_ID);
            adminConn.on('data', d => handleIncoming('ADMIN', d));
            adminConn.on('error', () => setTimeout(connectToAdmin, 5000));
        }

        function handleIncoming(senderId, data) {
            if (data.type === 'public') {
                messageHistory.public.push({ sender: senderId, text: data.text });
                if (isAdmin) {
                    Object.values(connections).forEach(c => c.open && c.send(data));
                }
            } else if (data.type === 'private') {
                if (!messageHistory.private[senderId]) messageHistory.private[senderId] = [];
                messageHistory.private[senderId].push({ sender: senderId, text: data.text });
            } else if (data.type === 'alert') {
                alert(`SYSTEM ALERT: ${data.text}`);
            }
            if (currentChat === 'public' || activePrivateId === senderId) renderMessages();
        }

        function renderMessages() {
            const box = document.getElementById('chat-box');
            box.innerHTML = '';
            const msgs = currentChat === 'public' ? messageHistory.public : (messageHistory.private[activePrivateId] || []);
            
            msgs.forEach(m => {
                const isMe = m.sender === (isAdmin ? 'ADMIN' : myId);
                const div = document.createElement('div');
                div.className = `flex flex-col ${isMe ? 'items-end' : 'items-start'}`;
                
                const tag = document.createElement('span');
                tag.className = `text-[9px] font-orbitron mb-1 ${isMe ? 'text-[#ff00ff]' : 'text-[#00f2ff]'}`;
                tag.textContent = isMe ? 'YOU' : (m.sender === 'ADMIN' ? 'MONARCH' : m.sender.substring(0,8));
                
                const bubble = document.createElement('div');
                bubble.className = `glass px-5 py-3 rounded-2xl max-w-[80%] text-sm border-white/10 ${isMe ? 'bg-[#ff00ff22]' : 'bg-[#00f2ff22]'}`;
                bubble.textContent = m.text;
                
                div.appendChild(tag);
                div.appendChild(bubble);
                box.appendChild(div);
            });
            box.scrollTop = box.scrollHeight;
        }

        document.getElementById('chat-send').onclick = () => {
            const input = document.getElementById('chat-input');
            const val = input.value.trim();
            if (!val) return;

            if (val.startsWith('/') && isAdmin) {
                handleAdminCommand(val);
                input.value = '';
                return;
            }

            const msg = { type: currentChat === 'public' ? 'public' : 'private', text: val, sender: isAdmin ? 'ADMIN' : myId };
            
            if (isAdmin) {
                if (currentChat === 'public') {
                    messageHistory.public.push({ sender: 'ADMIN', text: val });
                    Object.values(connections).forEach(c => c.open && c.send(msg));
                } else {
                    messageHistory.private[activePrivateId].push({ sender: 'ADMIN', text: val });
                    connections[activePrivateId].send(msg);
                }
            } else {
                if (adminConn && adminConn.open) adminConn.send(msg);
                if (currentChat === 'public') messageHistory.public.push({ sender: myId, text: val });
                else messageHistory.private['ADMIN'].push({ sender: myId, text: val });
            }
            
            renderMessages();
            input.value = '';
        };

        function handleAdminCommand(cmd) {
            const [action, ...args] = cmd.split(' ');
            const text = args.join(' ');
            
            if (action === '/alert') {
                Object.values(connections).forEach(c => c.open && c.send({ type: 'alert', text }));
            } else if (action === '/clear') {
                messageHistory.public = [];
                renderMessages();
            } else if (action === '/status') {
                document.getElementById('rank-badge').innerText = text;
            }
        }

        function updateUserList() {
            const list = document.getElementById('user-list');
            list.innerHTML = `
                <button onclick="selectChat('public')" class="w-full p-4 rounded-xl ${currentChat === 'public' ? 'bg-[#00f2ff22] border-l-4 border-[#00f2ff]' : 'hover:bg-white/5'} flex items-center gap-3">
                    <i data-lucide="globe" class="w-4 h-4"></i> Public Hub
                </button>
            `;
            Object.keys(connections).forEach(id => {
                list.innerHTML += `
                    <button onclick="selectChat('${id}')" class="w-full p-4 rounded-xl ${activePrivateId === id ? 'bg-[#ff00ff22] border-l-4 border-[#ff00ff]' : 'hover:bg-white/5'} flex items-center gap-3">
                        <i data-lucide="user" class="w-4 h-4"></i> ${id.substring(0,10)}...
                    </button>
                `;
            });
            lucide.createIcons();
        }

        function selectChat(id) {
            if (id === 'public') {
                currentChat = 'public';
                activePrivateId = null;
                document.getElementById('active-chat-name').innerText = 'PUBLIC HUB';
            } else {
                currentChat = 'private';
                activePrivateId = id;
                document.getElementById('active-chat-name').innerText = `DM: ${id.substring(0,10)}...`;
            }
            updateUserList();
            renderMessages();
        }

        function order(i) {
            window.open(`https://wa.me/16582013679?text=I would like to acquire [${i}]. ID: ${myId}`);
        }

        // --- Three.js ---
        function initThree() {
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // Vortex
            const partGeo = new THREE.BufferGeometry();
            const partCount = 5000;
            const pos = new Float32Array(partCount * 3);
            for(let i=0; i<partCount; i++) {
                const r = 2 + Math.random() * 5;
                const theta = Math.random() * Math.PI * 2;
                pos[i*3] = r * Math.cos(theta);
                pos[i*3+1] = (Math.random()-0.5) * 15;
                pos[i*3+2] = r * Math.sin(theta);
            }
            partGeo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            const vortex = new THREE.Points(partGeo, new THREE.PointsMaterial({ size: 0.02, color: 0x00f2ff, transparent: true, opacity: 0.5 }));
            scene.add(vortex);

            // Sakura
            const sakuraGeo = new THREE.BufferGeometry();
            const sakuraCount = 1000;
            const sPos = new Float32Array(sakuraCount * 3);
            for(let i=0; i<sakuraCount; i++) {
                sPos[i*3] = (Math.random()-0.5)*20;
                sPos[i*3+1] = (Math.random()-0.5)*20;
                sPos[i*3+2] = (Math.random()-0.5)*20;
            }
            sakuraGeo.setAttribute('position', new THREE.BufferAttribute(sPos, 3));
            const sakura = new THREE.Points(sakuraGeo, new THREE.PointsMaterial({ size: 0.08, color: 0xffb7c5, transparent: true, opacity: 0.9 }));
            scene.add(sakura);

            camera.position.z = 5;

            function animate() {
                requestAnimationFrame(animate);
                vortex.rotation.y += 0.002;
                sakura.rotation.y -= 0.001;
                sakura.position.y -= 0.01;
                if(sakura.position.y < -10) sakura.position.y = 10;
                renderer.render(scene, camera);
            }
            animate();

            window.onresize = () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            };
        }
    </script>
</body>
</html>
